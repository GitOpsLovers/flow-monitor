name: Release

on:
  issues:
    types: [opened]

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'release')
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.4
        with:
          package_json_file: code/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24.15.0"
          cache: pnpm
          cache-dependency-path: code/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: code

      - name: Build installer
        run: pnpm run build --filter @flow-monitor/installer
        working-directory: code

      - name: Semantic Release
        run: npx --package @semantic-release/changelog --package @semantic-release/git --package @semantic-release/commit-analyzer --package @semantic-release/release-notes-generator --package @semantic-release/github --package @semantic-release/exec semantic-release
        working-directory: code
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Close issue
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'completed'
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '✅ Release completed successfully!'
            });
